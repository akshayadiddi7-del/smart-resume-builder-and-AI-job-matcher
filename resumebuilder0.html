<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* FORM PAGE */
.form-page {
  max-width: 650px;
  margin: 40px auto;
  padding: 25px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.form-page h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  transition: 0.3s;
}

input:focus, textarea:focus {
  border-color: #4facfe;
  outline: none;
  box-shadow: 0 0 5px rgba(79,172,254,0.5);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #4facfe, #007bff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

.section-title {
  margin-top: 20px;
  font-weight: bold;
  color: #444;
}

/* RESUME PAGE */
.resume-page {
  display: none;
  background: white;
  max-width: 800px;
  margin: 30px auto;
  padding: 40px;
  border-radius: 10px;
}

/* TITLE */
.resume-title {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* TOP SECTION */
.resume-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 15px;
}

/* NAME */
.name {
  font-size: 28px;
  font-weight: bold;
}

/* PHOTO */
.right-photo img {
  width: 150px;
  height: 110px;
  object-fit: cover;
  border: 2px solid black;
  
}

/* SECTIONS (NO BOXES) */
.section {
  margin-top: 15px;
  padding: 10px;
  border: none;
}
/* SECTION TITLE */
.section h3 {
  margin-bottom: 5px;
  border: none;
}

/* ITEMS */
.item {
  margin: 4px 0;
}

/* REMOVE ANY BOX LOOK */
.resume-box {
  border: 2px solid black;
  padding: 15px;
  box-shadow: 15px;
}

/* PDF IMPROVEMENT ONLY (DO NOT AFFECT UI) */
@media print {

  #resumeContent {
    width: 100%;
    padding: 20px;
    border: 2px solid black;
    box-sizing: border-box;
  }

  .resume-header {
    border-bottom: 2px solid black;
    padding-bottom: 15px;
    margin-bottom: 15px;
  }
.section {
  margin-top: 15px;
  padding: 10px;
  border: none;
}

.section h3 {
  margin-bottom: 5px;
  border: none;
}
  .item {
  margin-left: 10px;
}
/* FINAL RESUME BOX STYLE */
.resume-box {
  
  border: 2px solid black;
  padding: 25px;
  box-sizing: border-box;
  border-radius: 8px;
}
.resume-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 2px solid black;
  padding-bottom: 15px;
  margin-bottom: 15px;
}

.left-info {
  flex: 1;
}

.right-photo img {
  width: 110px;
  height: 110px;
  object-fit: cover;
  border: 10px solid black;
 /* square photo */
}
}
</style>
</head>

<body>

<!-- FORM -->
<div class="form-page" id="formPage">

<h2>Build Your Resume</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input type="file" id="photo">

<div class="section-title">Skills</div>
<textarea id="skills"></textarea>

<div class="section-title">Education</div>
<textarea id="education"></textarea>

<div class="section-title">Experience</div>
<textarea id="experience"></textarea>

<div class="section-title">Projects</div>
<div id="projects"></div>
<button onclick="addProject()">+ Add Project</button>

<div class="section-title">Certificates</div>
<div id="certificates"></div>
<button onclick="addCertificate()">+ Add Certificate</button>

<button onclick="generateResume()">Generate Resume</button>

</div>

<!-- RESUME -->
<div class="resume-page" id="resumePage">

<div class="resume-title">Resume</div>


<div id="resumeContent"></div>

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="goToJobMatcher()">AI Job Matcher</button>


</div>

<script>
let photoData = "";

// PHOTO
document.getElementById("photo").addEventListener("change", function() {
  const reader = new FileReader();
  reader.onload = e => photoData = e.target.result;
  reader.readAsDataURL(this.files[0]);
});

// ADD PROJECT
function addProject() {
  const div = document.createElement("div");
  div.innerHTML = `
    <input placeholder="Project Title">
    <textarea placeholder="Description"></textarea>
  `;
  document.getElementById("projects").appendChild(div);
}

// ADD CERTIFICATE
function addCertificate() {
  const div = document.createElement("div");
  div.innerHTML = `<input placeholder="Certificate Name">`;
  document.getElementById("certificates").appendChild(div);
}

// GENERATE RESUME
function generateResume() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const skills = document.getElementById("skills").value;
  const education = document.getElementById("education").value;
  const experience = document.getElementById("experience").value;

  let projectHTML = "";
  document.querySelectorAll("#projects div").forEach(div => {
    const i = div.querySelectorAll("input, textarea");
    projectHTML += `<div class="item"><b>${i[0].value}</b><br>${i[1].value}</div>`;
  });

  let certHTML = "";
  document.querySelectorAll("#certificates div").forEach(div => {
    const val = div.querySelector("input").value;
    certHTML += `<div class="item">${val}</div>`;
  });

  const html = `
<div class="resume-box">

  <div class="resume-top">
    <div class="left-info">

  <div class="name">${name}</div>

  <br>

  <div><b>Email</b></div>
  <div>${email}</div>

  <br>

  <div><b>Phone Number</b></div>
  <div>${phone}</div>
<br>
<div class="section">
  <h3>Skills</h3>
  <div>${skills}</div>
</div>
</div>
<div class="right-photo">
      <img src="${photoData}">
    </div>
  </div>
  <div class="section">
  <h3>Education</h3>
  <div>${education}</div>
  </div>
  <div class="section">
    <h3>Experience</h3>
    <div>${experience}</div>
  </div>
  <div class="section">
    <h3>Projects</h3>
    ${projectHTML}
  </div>
  <div class="section">
    <h3>Certificates</h3>
    ${certHTML}
  </div>
</div>
`;
document.getElementById("resumeContent").innerHTML = html; document.getElementById("formPage").style.display = "none"; document.getElementById("resumePage").style.display = "block"; }

// DOWNLOAD
function downloadPDF() {
  const element = document.getElementById("resumeContent");

  const opt = {
    margin: 0.5,
    filename: 'resume.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save();
}
function goToJobMatcher() {
  document.body.style.opacity = "0";
  setTimeout(() => {
    window.location.href = "jobrecommend1.html";
  }, 300);
}
</script>
</body>
</html>
