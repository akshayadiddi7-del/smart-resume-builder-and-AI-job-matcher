<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <!-- Responsive Meta Tag -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <style>

    *{
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    .login-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
    }

    input:focus{
      border-color: #4facfe;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4facfe;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background: #00c6ff;
    }

    .error {
      color: red;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }

    .buttons{
      display: none;
    }

    /* Responsive Design */

    @media screen and (max-width: 768px){

      .login-container{
        width: 100%;
        padding: 20px;
      }

      h2{
        font-size: 24px;
      }

      input{
        padding: 12px;
      }

      button{
        padding: 12px;
      }

    }

  </style>

</head>

<body>

<div class="login-container">

  <h2>Login</h2>

  <input type="text" id="username" placeholder="Username">

  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p class="error" id="error"></p>

</div>

<div class="buttons">
  <a href="homepage.html"></a>
</div>

<script>

function login() {

  const username = document.getElementById("username").value;

  const password = document.getElementById("password").value;

  const error = document.getElementById("error");

  // optional: only check empty fields
  if (username === "" || password === "") {

    error.textContent = "Please fill all fields";

    return;

  }

  // direct login (no validation)
  window.location.href = "homepage.html";

}

</script>

</body>
</html>
