    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .welcome {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: white;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
  font-family: Arial, sans-serif;
}

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #4facfe;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #00c6ff;
    }

    .login-link {
      text-align: center;
      margin-top: 10px;
    }

    .login-link a {
      text-decoration: none;
      color: #4facfe;
    }
  </style>
</head>
<body>
  <h1 class="welcome">✨Welcome to my Website✨</h1>

<div class="container">
  <h2>Register</h2>
  <form id="registerForm">
    
    <div class="input-group">
      <label>Name</label>
      <input type="text" name="name" required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>

     <button type="submit" id="registerBtn" class="btn">Register</button>

  </form>
  <div class="redirect-link">
        Already have an account? <a href="login.html">Login</a>
    </div>

<script>
  document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = {
      name: this.name.value,
      email: this.email.value,
      password: this.password.value
    };

    try {
      const res = await fetch("http://localhost:3000/api/user", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(formData)
      });

      const data = await res.json();
      alert("User registered successfully!");
      console.log(data);
    } catch (err) {
      console.error(err);
      alert("Error registering user");
    }
  });
  document.getElementById('registerBtn').addEventListener('click', function() {
        // Redirect to login page after clicking register
        window.location.href = "login.html"; // Replace with the actual login page URL
    });
</script>
</body>
</html>
